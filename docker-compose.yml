services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.local
    environment:
      DATABASE_URL: file:./data/cuochop.db
      HOSTNAME: 0.0.0.0
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    volumes:
      - ./tmp/uploads:/app/tmp/uploads
      - ./data:/app/data
